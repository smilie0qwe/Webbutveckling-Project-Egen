<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="topbar-top">
                <div class="menu"></div>
                <div class="topbar-steam-logo"></div>
            </div>
            <div class="topbar-bottom">
                <div class="topbar-bottom-items"><span>Browse</span></div>
                <div class="topbar-bottom-items"><span>Recommendations</span></div>
                <div class="topbar-bottom-items"><span>Categories</span></div>
                <div class="topbar-bottom-items"><span>Hardware</span></div>
                <div class="topbar-bottom-items"><span>Ways to Play</span></div>
                <div class="topbar-bottom-items"><span>Special Selections</span></div>
                <div class="search">
                    <input type="search" placeholder="Search Steam">
                </div>
                <div class="topbar-bottom-items"><span>Wishlist</span></div>
            </div>
        </div>
        <div class="main-content"></div>
    </div>
</body>
</html>
