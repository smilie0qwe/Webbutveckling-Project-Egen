<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam</title>
    <link rel="stylesheet" href="topbar.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="topbar-top">
                <div class="topvar-big">
                    <div class="topbar-left">
                        <img src="steam-logo.png" alt="Steam Logo" class="logo">
                        <span>STORE</span>
                        <span>COMMUNITY</span>
                        <span>RALPH</span>
                        <span>CHAT</span>
                        <span>SUPPORT</span>
                    </div>
                    <div class="topbar-right"></div>
                </div>
            </div>
            <div class="topbar-bottom">
                <span>Browse</span>
                <span>Recommendations</span>
                <span>Categories</span>
                <span>Hardware</span>
                <span>Ways to Play</span>
                <span>Special Selections</span>
                <div class="search">
                    <input type="search" placeholder="Search Steam">
                </div>
                <span>Wishlist</span>
            </div>
        </div>
        <div class="main-content"></div>
    </div>
</body>
</html>
