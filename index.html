<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam</title>
    <link rel="stylesheet" href="topbar.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
            <div class="topbar-top">
                <div class="topvar-big">
                    <div class="topbar-left">
                        <img src="https://store.fastly.steamstatic.com/public/shared/images/header/logo_steam.svg" alt="Steam Logo" class="logo">
                        <span>STORE</span>
                        <span>COMMUNITY</span>
                        <span>RALPH</span>
                        <span>CHAT</span>
                        <span>SUPPORT</span>
                    </div>
                    <div class="topbar-right"></div>
                </div>
            </div>
        <div class="main-content">
            <div class="topbar-bottom">
                <span>Browse</span>
                <span>Recommendations</span>
                <span>Categories</span>
                <span>Hardware</span>
                <span>Ways to Play</span>
                <span>Special Selections</span>
                <div class="search">
                    <input type="search" placeholder="Search the store">
                </div>
                <span>Wishlist</span>
            </div>
            <div class="site-test"></div>
        </div>
    </div>
    <script>
        const mainContent = document.querySelector('.main-content');
        mainContent.addEventListener('scroll', function() {
            let scrollTop = mainContent.scrollTop;
            if (scrollTop === 0) {
                // at the top
                document.querySelector('.topbar-top').classList.remove('hidden');
                document.querySelector('.topbar-bottom').classList.remove('shifted');
            } else {
                // scrolled down
                document.querySelector('.topbar-top').classList.add('hidden');
                document.querySelector('.topbar-bottom').classList.add('shifted');
            }
        });
    </script>
</body>
</html>
